name: Test Action

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Lint the action.yml itself ─────────────────────────────────────────────────
  validate-action:
    name: Validate action.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        shell: bash
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('action.yml'))" \
            && echo "action.yml is valid YAML" \
            || { echo "action.yml has YAML syntax errors"; exit 1; }

  # ── Run the CI steps against the example Terraform module ─────────────────────
  ci-example:
    name: CI — fmt / validate / lint
    runs-on: ubuntu-latest
    needs: validate-action
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run AWS Terraform Action (CI only)
        uses: ./
        with:
          working_directory: examples/basic
          run_fmt: 'true'
          run_validate: 'true'
          run_lint: 'true'
          run_docs: 'false'
          run_security_scan: 'false'
          run_plan: 'false'
          run_apply: 'false'
          comment_on_pr: 'false'

  # ── Docs check ────────────────────────────────────────────────────────────────
  docs-check:
    name: Docs — terraform-docs
    runs-on: ubuntu-latest
    needs: validate-action
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run AWS Terraform Action (docs check)
        uses: ./
        with:
          working_directory: examples/basic
          run_fmt: 'false'
          run_validate: 'false'
          run_lint: 'false'
          run_docs: 'true'
          docs_push: 'false'
          run_security_scan: 'false'
          run_plan: 'false'
          run_apply: 'false'
          comment_on_pr: 'false'
